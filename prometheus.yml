global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'pedido-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['pedido-service:9003']

  - job_name: 'cozinha-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['cozinha-service:9010']
