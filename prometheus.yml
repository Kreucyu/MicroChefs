global:
  scrape_interval: 15s     
  evaluation_interval: 15s  
  scrape_timeout: 10s      

scrape_configs:

  - job_name: "cloudamqp-exporter"
    scrape_interval: 10s
    static_configs:
      - targets: ["cloudamqp-exporter:9419"]
        labels:
          environment: "development"
          service: "rabbitmq-cloudamqp"

  - job_name: "cozinha-service"
    scrape_interval: 10s
    metrics_path: "/actuator/prometheus"
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/cozinha.json
        refresh_interval: 15s

  - job_name: "pedido-service"
    scrape_interval: 15s
    metrics_path: "/actuator/prometheus"
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/pedido.json
        refresh_interval: 15s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
