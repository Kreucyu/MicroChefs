services:

  spring:
    build: .
    container_name: spring_app
    ports:
      - "8090:8090"
    networks:
      - private_network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/pedidos
      SPRING_DATASOURCE_USERNAME: docker
      SPRING_DATASOURCE_PASSWORD: docker

  db:
    image: postgres:latest
    container_name: pedidos_postgres
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: pedidos
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U docker -d docker" ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
    private_network:
      driver: bridge


