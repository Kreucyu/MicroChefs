  #    networks:
  #      - private_network
  #    environment:
  #      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pedidos
  #      SPRING_DATASOURCE_USERNAME: docker
  #      SPRING_DATASOURCE_PASSWORD: docker

  pedidos_db:
    image: postgres:16
    container_name: pedidos_postgres
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: pedidos
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_pedidos:/var/lib/postgresql/data
    networks:
      - private_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U docker -d pedidos" ]
      interval: 15s
      timeout: 5s
      retries: 5

  mensagens_db:
    image: postgres:16
    container_name: mensagens_postgres
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: mensagens
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_mensagens:/var/lib/postgresql/data
    networks:
      - private_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U docker -d mensagens" ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_pedidos:
    driver: local
  postgres_data_mensagens:
    driver: local

networks:
    private_network:
      driver: bridge


